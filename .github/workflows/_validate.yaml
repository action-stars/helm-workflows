name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  workflow:
    name: Workflow
    uses: action-stars/generic-workflows/.github/workflows/validate-gh-workflows.yaml@436b5d8ebbc67151ec77f214d667d7393c3916af # v0.11.0
    with:
      auto_doc: true
      shellcheck: true
      yamlfmt: true
      rumdl: true
