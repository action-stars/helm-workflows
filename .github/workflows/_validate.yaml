name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  workflow:
    name: Workflow
    uses: action-stars/generic-workflows/.github/workflows/validate-gh-workflows.yaml@38584cb405d18a37a34a267f18ded72214d0165a # v0.10.0
    with:
      auto_doc: true
      shellcheck: true
      yamlfmt: true
      rumdl: true
