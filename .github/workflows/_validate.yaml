name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  workflow:
    name: Workflow
    uses: action-stars/generic-workflows/.github/workflows/validate-gh-workflows.yaml@d4724b3ea1635d9cc7064f5302cc411e54d52334 # v0.9.0
    with:
      auto_doc: true
      shellcheck: true
      yamlfmt: true
      rumdl: true
